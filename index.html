:root{

  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Mulish',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.page{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;}
.header{display:grid;grid-template-columns:1fr auto;grid-template-rows:auto auto;gap:0.5rem 1.5rem;margin-bottom:1.5rem;border-bottom:1px solid var(--border);padding-bottom:1.5rem;align-items:end;}
.header-left{grid-column:1;grid-row:1/3;align-self:end;}
.header-right{grid-column:2;grid-row:1;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
.school-name{font-family:'Playfair Display',serif;font-size:42px;font-weight:600;letter-spacing:-0.03em;line-height:1.05;}
.school-sub{font-size:12px;color:var(--text3);margin-top:6px;font-weight:300;letter-spacing:0.02em;}
.month-nav{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 16px;flex-shrink:0;}
.month-nav button{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text2);padding:2px 6px;border-radius:6px;transition:background 0.15s;}
.month-nav button:hover{background:var(--surface2);}
.month-label{font-family:'Playfair Display',serif;font-size:16px;font-weight:500;min-width:130px;text-align:center;}
.tabs{display:flex;gap:6px;margin-bottom:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:5px;width:fit-content;flex-shrink:0;}
.tab{padding:7px 18px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all 0.2s;border:none;background:none;}
.tab.on{background:var(--text);color:#fff;box-shadow:0 2px 8px rgba(28,26,24,0.15);}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:1.5rem;}
.li{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
.ld{width:8px;height:8px;border-radius:50%;}
.layout{display:grid;grid-template-columns:1fr 240px;gap:20px;align-items:start;}
.cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.cal{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));}
.ch{background:var(--surface2);padding:10px 8px;text-align:center;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;border-bottom:1px solid var(--border);}
.c{padding:8px;min-height:90px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background 0.1s;}
.c:nth-child(7n){border-right:none;}
.c:hover{background:#FAFAF8;}
.empty{background:var(--surface2);opacity:0.5;}
.weekend{background:#FDFCFA;}
.dn{font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px;}
.weekend .dn{color:var(--text2);}
.slot{border-radius:5px;padding:3px 6px;margin-bottom:3px;font-size:10px;font-weight:500;line-height:1.4;}
.tod{background:#F0F7FF!important;outline:2px solid #378ADD;outline-offset:-2px;border-radius:0;}
.tod .dn{color:#1A5FA8;font-weight:700;}
.sa{background:#EEF0FF;color:#3730A3;}
.st{background:#ECFDF5;color:#065F46;}
.sg{background:#FEF3E2;color:#92400E;}
.sy{background:#FDF2F8;color:#831843;}
.sm{background:#FEF2F2;color:#991B1B;font-weight:600;}
.skf{background:#F0FDF4;color:#14532D;}
.sn{background:#EFF6FF;color:#1E3A8A;}

.sb-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
.sb-row{display:flex;flex-direction:column;gap:0;}
.sb-item{font-size:12px;color:var(--text2);line-height:1.6;padding:4px 0;display:flex;gap:7px;align-items:flex-start;}
.sb-item span{flex-shrink:0;font-size:14px;}
.sb-item-text{flex:1;}
.sb-item b{color:var(--text);font-weight:600;}
.sb-note{font-size:11.5px;color:var(--text2);line-height:1.6;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm);border-left:3px solid var(--border);}
.sb-bonus{font-size:11.5px;color:#065F46;line-height:1.6;padding:10px 12px;background:#ECFDF5;border-radius:var(--radius-sm);border-left:3px solid #6EE7B7;}
.sb-divider{border:none;border-top:1px solid var(--border);}
.sb-price{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--border);}
.sb-price:last-child{border-bottom:none;}
.sb-price-label{font-size:12px;color:var(--text);font-weight:500;}
.sb-price-sub{font-size:10px;color:var(--text3);margin-top:1px;}
.sb-price-val{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;}
.sb-btn{display:block;width:100%;padding:11px 16px;border-radius:var(--radius-sm);border:none;background:var(--text);color:#fff;cursor:pointer;font-size:12px;font-weight:600;text-align:center;text-decoration:none;font-family:'Mulish',sans-serif;letter-spacing:0.01em;transition:opacity 0.15s;}
.sb-btn:hover{opacity:0.85;}
.sb-btn-outline{background:none;border:1.5px solid var(--border);color:var(--text2);}
.sb-btn-outline:hover{border-color:var(--text);color:var(--text);opacity:1;}

.cal-wrap{animation:fadeIn 0.25s ease;}
.sidebar{animation:fadeIn 0.3s ease;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(28,26,24,0.6);z-index:1000;overflow-y:auto;padding:2rem 1rem;}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center;}
.modal{background:var(--surface);border-radius:20px;max-width:900px;width:100%;margin:auto;overflow:hidden;position:relative;animation:fadeIn 0.2s ease;}
.modal-close{position:absolute;top:16px;right:16px;background:var(--surface2);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;z-index:10;transition:background 0.15s;}

.modal-inner{padding:2rem;}
.modal-header{text-align:center;margin-bottom:1.5rem;}
.modal-title{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;letter-spacing:-0.02em;margin-bottom:6px;}
.modal-sub{font-size:12px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;}
.trainer-tabs{display:flex;justify-content:center;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap;}
.ttab{display:flex;align-items:center;gap:7px;padding:7px 16px;border-radius:40px;border:1.5px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-family:'Geologica',sans-serif;font-size:13px;font-weight:500;transition:all .2s;}

.ttab.active{border-color:var(--tacc);color:var(--tacc);background:color-mix(in srgb,var(--tacc) 8%,transparent);}

.tcard{background:var(--surface2);border-radius:16px;padding:24px;position:relative;overflow:hidden;}

.tbar-val{font-size:12px;font-weight:500;width:28px;text-align:right;flex-shrink:0;}
.radar-wrap{background:var(--surface2);border-radius:16px;padding:20px;display:flex;flex-direction:column;align-items:center;}
.radar-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;align-self:flex-start;}

</head>

const LABELS=Object.keys(TRAINERS[0].s);
let curTrainer=0,radarChart=null;

function openModal(){
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
  if(!document.getElementById('trainerTabs').children.length) buildTrainerTabs();
  selectTrainer(curTrainer);
}
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';}

function buildTrainerTabs(){
  const el=document.getElementById('trainerTabs');
  TRAINERS.forEach((p,i)=>{
    const btn=document.createElement('button');
    btn.className='ttab'+(i===curTrainer?' active':'');
    btn.style.setProperty('--tacc',p.acc);
    btn.innerHTML=`<span class="tdot" style="background:${p.acc}"></span>${p.full.split(' ')[0]}`;
    btn.onclick=()=>selectTrainer(i);
    el.appendChild(btn);
  });
}

function selectTrainer(i){
  curTrainer=i;
  const p=TRAINERS[i];
  document.querySelectorAll('.ttab').forEach((t,j)=>{
    t.classList.toggle('active',j===i);
  });
  const card=document.getElementById('tcard');
  card.style.setProperty('--tacc',p.acc);
  card.innerHTML=`
    <div class="tavatar" style="background:${p.avBg};color:${p.avFg}">${p.ini}</div>
    <div class="thandle">${p.handle}</div>
    <div class="tbadge">зубное кунг-фу: ${p.kf}</div>
    <div class="tname">${p.emoji} ${p.name}</div>
    <div class="tdesc">${p.desc}</div>
    <div class="tbars-label">Показатели</div>
    <div class="tbars">${LABELS.map(l=>`
      <div class="tbar-row">
        <span class="tbar-name">${l}</span>
        <div class="tbar-track"><div class="tbar-fill" style="width:${(p.s[l]/5)*100}%;background:${p.acc}"></div></div>
        <span class="tbar-val">${p.s[l]}</span>
      </div>`).join('')}
    </div>`;

  document.getElementById('tprice').textContent=p.price;
  const ctaBtn=document.getElementById('tctaBtn');
  ctaBtn.href=p.tg;
  ctaBtn.textContent=`Записаться → ${p.handle}`;

  const canvas=document.getElementById('radarChart');
  const wrap=canvas.parentElement;
  const size=Math.min(wrap.offsetWidth-40,280);
  canvas.width=size;canvas.height=size;
  const ctx=canvas.getContext('2d');
  if(radarChart)radarChart.destroy();
  radarChart=new Chart(ctx,{type:'radar',data:{labels:LABELS,datasets:[{data:LABELS.map(l=>p.s[l]),backgroundColor:p.acc+'18',borderColor:p.acc,borderWidth:2,pointBackgroundColor:p.acc,pointBorderColor:'#fff',pointBorderWidth:1.5,pointRadius:4}]},options:{responsive:false,layout:{padding:{top:16,bottom:16,left:16,right:16}},plugins:{legend:{display:false}},scales:{r:{min:0,max:5,ticks:{display:false,stepSize:1},grid:{color:'rgba(0,0,0,0.06)'},angleLines:{color:'rgba(0,0,0,0.06)'},pointLabels:{font:{size:10,family:"'Geologica',sans-serif"},color:'#9a9790',padding:10}}}}});
}

// Calendar
const DAY_NAMES=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const COL_DOWS=[1,2,3,4,5,6,0];
const WEEKENDS=new Set([6,0]);
const WEEKDAYS=new Set([1,2,3,4,5]);

function moneyDays(y,m){const res=new Set();for(let i=0;i<8;i++){const d=new Date(y,m,21+i);if(d.getMonth()===m)res.add(d.getDate());}return res;}
function maskDays(y,m){const res=new Set();const last=new Date(y,m+1,0).getDate();for(let d=1;d<=last;d+=3)res.add(d);return res;}

function switchTab(t,el){
  mode=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  render();
}

function render(){
  document.getElementById('mlbl').textContent=MR[cm]+' '+cy;
  document.getElementById('legend').innerHTML=(mode===0?IO_LEG:ZKF_LEG).map(x=>`<div class="li"><div class="ld" style="background:${x.c}"></div>${x.l}</div>`).join('');
  document.getElementById('sidebar').innerHTML=mode===0?SIDEBAR_IO:SIDEBAR_ZKF;
  renderCal();
}

function renderCal(){
  const cal=document.getElementById('cal');
  const last=new Date(cy,cm+1,0).getDate();
  const today=new Date();
  const todayD=(today.getFullYear()===cy&&today.getMonth()===cm)?today.getDate():-1;
  const money=moneyDays(cy,cm);
  const masks=maskDays(cy,cm);
  const firstDow=new Date(cy,cm,1).getDay();
  const startOffset=COL_DOWS.indexOf(firstDow);
  const totalCells=Math.ceil((startOffset+last)/7)*7;
  let html='';
  DAY_NAMES.forEach(n=>{html+=`<div class="ch">${n}</div>`;});
  for(let cell=0;cell<totalCells;cell++){
    const col=cell%7,dow=COL_DOWS[col],date=cell-startOffset+1;
    const isWeekend=WEEKENDS.has(dow),isWeekday=WEEKDAYS.has(dow);
    if(date<1||date>last){html+=`<div class="c empty"></div>`;continue;}
    const isToday=date===todayD;
    const cls=['c',isToday?'tod':'',isWeekend&&!isToday?'weekend':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}"><div class="dn">${date}</div>`;
    if(mode===0){
      (IO_SCHED[dow]||[]).forEach(s=>{html+=`<div class="slot ${s.cls}">${s.lbl}</div>`;});
    } else {
      if(isWeekday)html+=`<div class="slot skf">Тренировки Зубного кунг-фу</div>`;
      if(money.has(date))html+=`<div class="slot sm">Денежный интенсив (бонус)</div>`;
      if(masks.has(date))html+=`<div class="slot sn">Работа с маской (бонус)</div>`;
    }
    html+=`</div>`;
  }
  cal.innerHTML=html;
}

function prevM(){cm--;if(cm<0){cm=11;cy--;}render();}
function nextM(){cm++;if(cm>11){cm=0;cy++;}render();}
render();
</script>
