<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Расписание школы</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#1a1a1a;padding:1.5rem;}
}
.w{max-width:1100px;margin:0 auto;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.title{font-size:16px;font-weight:500;}
.tabs{display:flex;gap:4px;margin-bottom:1rem;}
.tab{padding:5px 14px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;cursor:pointer;font-size:12px;color:#666;background:none;}
.tab.on{background:#f0f0f0;color:#1a1a1a;font-weight:500;}
.tab.on{background:#2a2a2a;color:#f0f0f0;}}
.mnav{display:flex;align-items:center;gap:6px;}
.mnav button{border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;padding:3px 10px;font-size:12px;cursor:pointer;background:none;color:inherit;}
.mnav button:hover{background:#f0f0f0;}
.mnav button:hover{background:#2a2a2a;}}
.mlbl{font-size:13px;font-weight:500;min-width:110px;text-align:center;}
.leg{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#666;}
.ld{width:9px;height:9px;border-radius:50%;}
.layout{display:grid;grid-template-columns:1fr 220px;gap:12px;align-items:start;}
@media(max-width:700px){.layout{grid-template-columns:1fr;}}
.cal{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:1px;background:rgba(0,0,0,0.1);border-radius:12px;overflow:hidden;}
}
.c{background:#fff;padding:6px 8px;min-height:80px;}
}
.ch{background:#f5f5f5;padding:6px 8px;min-height:auto;text-align:center;font-size:11px;font-weight:500;color:#888;}
}
.dn{font-size:13px;font-weight:500;margin-bottom:4px;}
.slot{border-radius:4px;padding:2px 5px;margin-bottom:2px;font-size:10px;line-height:1.35;}
.empty{background:#f9f9f9;min-height:80px;}
}
.weekend{background:#fafafa;}
}
.sidebar{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:1rem;display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:600px;}
}
.sb-label{font-size:10px;font-weight:500;color:#aaa;letter-spacing:0.05em;margin-bottom:2px;text-transform:uppercase;}
.sb-row{display:flex;flex-direction:column;gap:4px;}
.sb-item{font-size:11px;color:#666;line-height:1.45;}
}
.sb-item b{color:#1a1a1a;font-weight:500;}
}
.sb-note{font-size:11px;color:#666;line-height:1.5;padding:6px 8px;background:#f5f5f5;border-radius:8px;}
}
.sb-bonus{font-size:11px;color:#27500A;line-height:1.5;padding:6px 8px;background:#EAF3DE;border-radius:8px;}
}
.sb-divider{border:none;border-top:0.5px solid rgba(0,0,0,0.1);}
}
.sb-price{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:0.5px solid rgba(0,0,0,0.08);}
.sb-price:last-child{border-bottom:none;}
.sb-price-label{font-size:11px;color:#666;}
.sb-price-sub{font-size:10px;color:#aaa;}
.sb-price-val{font-size:12px;font-weight:500;}
.sb-price-val.big{color:#854F0B;}
.sb-price-val.big{color:#EF9F27;}}
.sb-btn{display:block;width:100%;padding:8px 12px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);background:#f5f5f5;cursor:pointer;font-size:12px;font-weight:500;color:#1a1a1a;text-align:center;text-decoration:none;}
.sb-btn:hover{background:#ebebeb;}
.sb-btn:hover{background:#333;}}
.tod{outline:2px solid #378ADD;outline-offset:-2px;}
.tod .dn{color:#185FA5;}
}
.sa{background:#EEEDFE;color:#3C3489;}
.st{background:#E1F5EE;color:#085041;}
.sg{background:#FAEEDA;color:#633806;}
.sy{background:#FBEAF0;color:#72243E;}
.sm{background:#FCEBEB;color:#791F1F;font-weight:500;}
.skf{background:#EAF3DE;color:#27500A;}
.sn{background:#E6F1FB;color:#0C447C;}

.st{background:#04342C;color:#9FE1CB;}
.sg{background:#412402;color:#FAC775;}
.sy{background:#4B1528;color:#F4C0D1;}
.sm{background:#501313;color:#F7C1C1;}
.skf{background:#173404;color:#C0DD97;}
.sn{background:#042C53;color:#85B7EB;}
}
</style>
</head>
<body>
<div class="w">
<div class="hdr">
  <div class="title" id="schoolTitle">Исцеление отношений</div>
  <div class="mnav">
    <button onclick="prevM()">←</button>
    <div class="mlbl" id="mlbl"></div>
    <button onclick="nextM()">→</button>
  </div>
</div>
<div class="tabs">
  <div class="tab on" onclick="switchTab(0,this)">Исцеление отношений</div>
  <div class="tab" onclick="switchTab(1,this)">Зубное кунг-фу</div>
</div>
<div class="leg" id="legend"></div>
<div class="layout">
  <div id="calWrap"></div>
  <div class="sidebar" id="sidebar"></div>
</div>
</div>

<script>
const MR=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
let cy=2026,cm=2,mode=0;

const IO_SCHED={
  1:[{cls:'st',lbl:'Таня 10:00–11:00'}],
  2:[{cls:'sa',lbl:'Антон 08:00–09:00'}],
  3:[{cls:'sg',lbl:'Гульназ 15:00–16:00'}],
  4:[{cls:'sa',lbl:'Антон 08:00–09:00'},{cls:'sa',lbl:'10:00–11:00'},{cls:'st',lbl:'Таня 20:00–21:00'}],
  5:[{cls:'sa',lbl:'Антон 08:00–09:00'},{cls:'sa',lbl:'10:00–11:00'}],
  6:[{cls:'sa',lbl:'Антон 08:00–09:00'},{cls:'sa',lbl:'10:00–11:00'}],
  0:[{cls:'sy',lbl:'Яна 11:00–12:00'}]
};

const IO_LEG=[
  {c:'#7F77DD',l:'Антон'},{c:'#1D9E75',l:'Таня'},{c:'#BA7517',l:'Гульназ'},{c:'#D4537E',l:'Яна'}
];
const ZKF_LEG=[
  {c:'#639922',l:'Тренировки Зубного кунг-фу'},{c:'#E24B4A',l:'Денежный интенсив (бонус, с 21-го)'},{c:'#378ADD',l:'Работа с маской через контент (бонус, каждые 3 дня)'}
];

const SIDEBAR_IO=`
<div class="sb-row">
  <div class="sb-label">С чем работаем</div>
  <div class="sb-item">🧠 <b>Лимбическая система</b> — через саморегуляцию</div>
  <div class="sb-item">⚔️ <b>Место в иерархии</b> — через стычки с альфа-жертвой</div>
  <div class="sb-item">🎙️ <b>Всё актуальное</b> — через групповые эфиры</div>
  <div class="sb-item">🪞 <b>Интеграция отчуждённой части</b> — через созидательные экспозиции</div>
  <div class="sb-item">💀 <b>Маски и нарц. коллапс</b> — через «Божественный контент»</div>
</div>
<hr class="sb-divider">
<div class="sb-row">
  <div class="sb-label">Что входит</div>
  <div class="sb-item">🦷 Атаки по зубам, проверка саморегуляций</div>
  <div class="sb-item">🎙️ 11 групповых эфиров в неделю</div>
  <div class="sb-item">🧘 Медитация для проработки дискомфорта</div>
  <div class="sb-item">🌬️ Дыхательная медитация</div>
  <div class="sb-item">🔒 Бесплатный VPN для всей семьи</div>
</div>
<hr class="sb-divider">
<div class="sb-row">
  <div class="sb-label">Стоимость</div>
  <div class="sb-price"><span class="sb-price-label">1 месяц</span><span class="sb-price-val">15 000 ₽</span></div>
  <div class="sb-price"><span class="sb-price-label">3 месяца</span><span class="sb-price-val">35 000 ₽</span></div>
  <div class="sb-price"><span class="sb-price-label">6 месяцев</span><span class="sb-price-val">60 000 ₽</span></div>
  <div class="sb-price"><span class="sb-price-label">12 месяцев</span><span class="sb-price-val">108 000 ₽</span></div>
</div>
<hr class="sb-divider">
<a class="sb-btn" href="https://t.me/psyteeth" target="_blank">Записаться → @psyteeth</a>
`;

const SIDEBAR_ZKF=`
<div class="sb-note">Зубное кунг-фу проходится только вместе с Исцелением отношений. Всё, что входит в ИО — входит и сюда, плюс:</div>
<div class="sb-row">
  <div class="sb-label">Дополнительно</div>
  <div class="sb-item">💪 5 тренировок в неделю с персональным тренером</div>
  <div class="sb-item">🎬 Групповые эфиры по созданию контента</div>
  <div class="sb-item">💀 Групповые эфиры с поддержкой в проживании нарциссического коллапса</div>
</div>
<hr class="sb-divider">
<div class="sb-row">
  <div class="sb-label">Бонусы для участников ЗКФ</div>
  <div class="sb-bonus">Работа с маской через контент и денежный интенсив проводятся бонусом для всех участников ЗКФ. Можно ходить по желанию.</div>
</div>
<hr class="sb-divider">
<div class="sb-row">
  <div class="sb-label">Стоимость абонемента</div>
  <div class="sb-price">
    <div><div class="sb-price-label">1 месяц</div><div class="sb-price-sub">Таня, Яна или Гульназ</div></div>
    <span class="sb-price-val">35 000 ₽</span>
  </div>
  <div class="sb-price">
    <div><div class="sb-price-label">3 месяца</div><div class="sb-price-sub">Таня, Яна или Гульназ</div></div>
    <span class="sb-price-val">95 000 ₽</span>
  </div>
  <div class="sb-price">
    <div><div class="sb-price-label">3 месяца</div><div class="sb-price-sub">⚡ Антон Казаков</div></div>
    <span class="sb-price-val big">500 000 ₽</span>
  </div>
</div>
<hr class="sb-divider">
<a class="sb-btn" href="https://t.me/psyteeth" target="_blank">Записаться → @psyteeth</a>
`;

const DAY_NAMES=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const COL_DOWS=[1,2,3,4,5,6,0];
const WEEKENDS=new Set([6,0]);
const WEEKDAYS=new Set([1,2,3,4,5]);

function moneyDays(y,m){
  const res=new Set();
  for(let i=0;i<8;i++){const d=new Date(y,m,21+i);if(d.getMonth()===m)res.add(d.getDate());}
  return res;
}
function maskDays(y,m){
  const res=new Set();
  const last=new Date(y,m+1,0).getDate();
  for(let d=1;d<=last;d+=3)res.add(d);
  return res;
}

function switchTab(t,el){
  mode=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('schoolTitle').textContent=t===0?'Исцеление отношений':'Зубное кунг-фу';
  render();
}

function render(){
  document.getElementById('mlbl').textContent=MR[cm]+' '+cy;
  document.getElementById('legend').innerHTML=(mode===0?IO_LEG:ZKF_LEG).map(x=>`<div class="li"><div class="ld" style="background:${x.c}"></div>${x.l}</div>`).join('');
  document.getElementById('sidebar').innerHTML=mode===0?SIDEBAR_IO:SIDEBAR_ZKF;
  renderCal();
}

function renderCal(){
  const wrap=document.getElementById('calWrap');
  const last=new Date(cy,cm+1,0).getDate();
  const today=new Date();
  const todayD=(today.getFullYear()===cy&&today.getMonth()===cm)?today.getDate():-1;
  const money=moneyDays(cy,cm);
  const masks=maskDays(cy,cm);
  const firstDow=new Date(cy,cm,1).getDay();
  const startOffset=COL_DOWS.indexOf(firstDow);
  const totalCells=Math.ceil((startOffset+last)/7)*7;

  let html=`<div class="cal">`;
  DAY_NAMES.forEach(n=>{html+=`<div class="ch">${n}</div>`;});

  for(let cell=0;cell<totalCells;cell++){
    const col=cell%7;
    const dow=COL_DOWS[col];
    const date=cell-startOffset+1;
    const isWeekend=WEEKENDS.has(dow);
    const isWeekday=WEEKDAYS.has(dow);

    if(date<1||date>last){html+=`<div class="c empty"></div>`;continue;}

    const isToday=date===todayD;
    const classes=['c',isToday?'tod':'',isWeekend&&!isToday?'weekend':''].filter(Boolean).join(' ');
    html+=`<div class="${classes}"><div class="dn">${date}</div>`;

    if(mode===0){
      (IO_SCHED[dow]||[]).forEach(s=>{html+=`<div class="slot ${s.cls}">${s.lbl}</div>`;});
    } else {
      if(isWeekday)html+=`<div class="slot skf">Тренировки Зубного кунг-фу</div>`;
      if(money.has(date))html+=`<div class="slot sm">Денежный интенсив (бонус)</div>`;
      if(masks.has(date))html+=`<div class="slot sn">Работа с маской (бонус)</div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;
  wrap.innerHTML=html;
}

function prevM(){cm--;if(cm<0){cm=11;cy--;}render();}
function nextM(){cm++;if(cm>11){cm=0;cy++;}render();}
render();
</script>
</body>
</html>
