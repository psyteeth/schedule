<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Расписание школы</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F5F2;
  --surface:#FFFFFF;
  --surface2:#F0EDE8;
  --border:#E8E4DE;
  --text:#1C1A18;
  --text2:#6B6560;
  --text3:#A8A29C;
  --accent:#2D5016;
  --accent2:#8B4513;
  --radius:12px;
  --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Mulish',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.page{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;}

/* Header */
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;gap:1rem;}
.header-left{}
.school-name{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;color:var(--text);letter-spacing:-0.02em;line-height:1.2;}
.school-sub{font-size:13px;color:var(--text3);margin-top:4px;font-weight:300;letter-spacing:0.03em;}
.month-nav{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 16px;}
.month-nav button{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text2);padding:2px 6px;border-radius:6px;transition:background 0.15s;}
.month-nav button:hover{background:var(--surface2);}
.month-label{font-family:'Playfair Display',serif;font-size:15px;font-weight:500;min-width:120px;text-align:center;color:var(--text);}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:5px;width:fit-content;}
.tab{padding:7px 18px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all 0.2s;border:none;background:none;}
.tab.on{background:var(--text);color:#fff;box-shadow:0 2px 8px rgba(28,26,24,0.15);}

/* Legend */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:1.5rem;}
.li{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);font-weight:400;}
.ld{width:8px;height:8px;border-radius:50%;}

/* Layout */
.layout{display:grid;grid-template-columns:1fr 240px;gap:20px;align-items:start;}

/* Calendar */
.cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.cal{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));}
.ch{background:var(--surface2);padding:10px 8px;text-align:center;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;border-bottom:1px solid var(--border);}
.c{padding:8px;min-height:90px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background 0.1s;}
.c:nth-child(7n){border-right:none;}
.c:hover{background:#FAFAF8;}
.empty{background:var(--surface2);opacity:0.5;}
.weekend{background:#FDFCFA;}
.dn{font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px;}
.weekend .dn{color:var(--text2);}
.slot{border-radius:5px;padding:3px 6px;margin-bottom:3px;font-size:10px;font-weight:500;line-height:1.4;}
.tod{background:#F0F7FF!important;}
.tod .dn{color:#1A5FA8;font-weight:700;}
.tod{outline:2px solid #378ADD;outline-offset:-2px;border-radius:0;}

/* Slot colors - warm, refined palette */
.sa{background:#EEF0FF;color:#3730A3;}
.st{background:#ECFDF5;color:#065F46;}
.sg{background:#FEF3E2;color:#92400E;}
.sy{background:#FDF2F8;color:#831843;}
.sm{background:#FEF2F2;color:#991B1B;font-weight:600;}
.skf{background:#F0FDF4;color:#14532D;}
.sn{background:#EFF6FF;color:#1E3A8A;}

/* Sidebar */
.sidebar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;display:flex;flex-direction:column;gap:14px;position:sticky;top:1.5rem;}
.sb-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
.sb-row{display:flex;flex-direction:column;gap:0;}
.sb-item{font-size:12px;color:var(--text2);line-height:1.6;padding:4px 0;display:flex;gap:7px;align-items:flex-start;}
.sb-item span{flex-shrink:0;font-size:14px;}
.sb-item-text{flex:1;}
.sb-item b{color:var(--text);font-weight:600;}
.sb-note{font-size:11.5px;color:var(--text2);line-height:1.6;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm);border-left:3px solid var(--border);}
.sb-bonus{font-size:11.5px;color:#065F46;line-height:1.6;padding:10px 12px;background:#ECFDF5;border-radius:var(--radius-sm);border-left:3px solid #6EE7B7;}
.sb-divider{border:none;border-top:1px solid var(--border);}
.sb-price{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--border);}
.sb-price:last-child{border-bottom:none;}
.sb-price-left{}
.sb-price-label{font-size:12px;color:var(--text);font-weight:500;}
.sb-price-sub{font-size:10px;color:var(--text3);margin-top:1px;}
.sb-price-val{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;}
.sb-price-val.premium{color:#92400E;}
.sb-btn{display:block;width:100%;padding:11px 16px;border-radius:var(--radius-sm);border:none;background:var(--text);color:#fff;cursor:pointer;font-size:13px;font-weight:600;text-align:center;text-decoration:none;font-family:'Mulish',sans-serif;letter-spacing:0.01em;transition:opacity 0.15s;}
.sb-btn:hover{opacity:0.85;}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.cal-wrap{animation:fadeIn 0.25s ease;}
.sidebar{animation:fadeIn 0.3s ease;}
</style>
</head>
<body>
<div class="page">

<div class="header">
  <div class="header-left">
    <div class="school-name" id="schoolName">Исцеление отношений</div>
    <div class="school-sub">Онлайн-школа психологии · psyteeth.com</div>
  </div>
  <div class="month-nav">
    <button onclick="prevM()">←</button>
    <div class="month-label" id="mlbl"></div>
    <button onclick="nextM()">→</button>
  </div>
</div>

<div class="tabs">
  <div class="tab on" onclick="switchTab(0,this)">Исцеление отношений</div>
  <div class="tab" onclick="switchTab(1,this)">Зубное кунг-фу</div>
</div>

<div class="legend" id="legend"></div>

<div class="layout">
  <div class="cal-wrap"><div class="cal" id="cal"></div></div>
  <div class="sidebar" id="sidebar"></div>
</div>

</div>
<script>
const MR=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
let cy=2026,cm=2,mode=0;

const IO_SCHED={
  1:[{cls:'st',lbl:'Таня 10:00–11:00'}],
  2:[{cls:'sa',lbl:'Антон 08:00–09:00'}],
  3:[{cls:'sg',lbl:'Гульназ 15:00–16:00'}],
  4:[{cls:'sa',lbl:'Антон 08:00–09:00'},{cls:'sa',lbl:'10:00–11:00'},{cls:'st',lbl:'Таня 20:00–21:00'}],
  5:[{cls:'sa',lbl:'Антон 08:00–09:00'},{cls:'sa',lbl:'10:00–11:00'}],
  6:[{cls:'sa',lbl:'Антон 08:00–09:00'},{cls:'sa',lbl:'10:00–11:00'}],
  0:[{cls:'sy',lbl:'Яна 11:00–12:00'}]
};

const IO_LEG=[
  {c:'#6366F1',l:'Антон'},{c:'#10B981',l:'Таня'},{c:'#F59E0B',l:'Гульназ'},{c:'#EC4899',l:'Яна'}
];
const ZKF_LEG=[
  {c:'#16A34A',l:'Тренировки Зубного кунг-фу'},
  {c:'#EF4444',l:'Денежный интенсив (бонус, с 21-го)'},
  {c:'#3B82F6',l:'Работа с маской (бонус, каждые 3 дня)'}
];

const SIDEBAR_IO=`
<div class="sb-row">
  <div class="sb-label">С чем работаем</div>
  <div class="sb-item"><span>🧠</span><div class="sb-item-text"><b>Лимбическая система</b> — через саморегуляцию</div></div>
  <div class="sb-item"><span>⚔️</span><div class="sb-item-text"><b>Место в иерархии</b> — через стычки с альфа-жертвой</div></div>
  <div class="sb-item"><span>🎙️</span><div class="sb-item-text"><b>Всё актуальное</b> — через групповые эфиры</div></div>
  <div class="sb-item"><span>🪞</span><div class="sb-item-text"><b>Интеграция отчуждённой части</b> — через созидательные экспозиции</div></div>
  <div class="sb-item"><span>💀</span><div class="sb-item-text"><b>Маски и нарц. коллапс</b> — через «Божественный контент»</div></div>
</div>
<hr class="sb-divider">
<div class="sb-row">
  <div class="sb-label">Что входит</div>
  <div class="sb-item"><span>🦷</span><div class="sb-item-text">Атаки по зубам, проверка саморегуляций</div></div>
  <div class="sb-item"><span>🎙️</span><div class="sb-item-text">11 групповых эфиров в неделю</div></div>
  <div class="sb-item"><span>🧘</span><div class="sb-item-text">Медитация для проработки дискомфорта</div></div>
  <div class="sb-item"><span>🌬️</span><div class="sb-item-text">Дыхательная медитация</div></div>
  <div class="sb-item"><span>🔒</span><div class="sb-item-text">Бесплатный VPN для всей семьи</div></div>
</div>
<hr class="sb-divider">
<div class="sb-row">
  <div class="sb-label">Стоимость</div>
  <div class="sb-price"><div class="sb-price-left"><div class="sb-price-label">1 месяц</div></div><span class="sb-price-val">15 000 ₽</span></div>
  <div class="sb-price"><div class="sb-price-left"><div class="sb-price-label">3 месяца</div></div><span class="sb-price-val">35 000 ₽</span></div>
  <div class="sb-price"><div class="sb-price-left"><div class="sb-price-label">6 месяцев</div></div><span class="sb-price-val">60 000 ₽</span></div>
  <div class="sb-price"><div class="sb-price-left"><div class="sb-price-label">12 месяцев</div></div><span class="sb-price-val">108 000 ₽</span></div>
</div>
<hr class="sb-divider">
<a class="sb-btn" href="https://t.me/psyteeth" target="_blank">Записаться → @psyteeth</a>
`;

const SIDEBAR_ZKF=`
<div class="sb-note">Зубное кунг-фу проходится только вместе с Исцелением отношений. Всё, что входит в ИО — входит и сюда, плюс:</div>
<div class="sb-row">
  <div class="sb-label">Дополнительно</div>
  <div class="sb-item"><span>💪</span><div class="sb-item-text">5 тренировок в неделю с персональным тренером</div></div>
  <div class="sb-item"><span>🎬</span><div class="sb-item-text">Групповые эфиры по созданию контента</div></div>
  <div class="sb-item"><span>💀</span><div class="sb-item-text">Групповые эфиры с поддержкой в проживании нарциссического коллапса</div></div>
</div>
<hr class="sb-divider">
<div class="sb-bonus">Работа с маской через контент и денежный интенсив — бонус для всех участников ЗКФ. Можно ходить по желанию.</div>
<hr class="sb-divider">
<div class="sb-row">
  <div class="sb-label">Стоимость абонемента</div>
  <div class="sb-price">
    <div class="sb-price-left"><div class="sb-price-label">1 месяц</div><div class="sb-price-sub">Таня, Яна или Гульназ</div></div>
    <span class="sb-price-val">35 000 ₽</span>
  </div>
  <div class="sb-price">
    <div class="sb-price-left"><div class="sb-price-label">3 месяца</div><div class="sb-price-sub">Таня, Яна или Гульназ</div></div>
    <span class="sb-price-val">95 000 ₽</span>
  </div>
  <div class="sb-price">
    <div class="sb-price-left"><div class="sb-price-label">3 месяца</div><div class="sb-price-sub">⚡ Антон Казаков</div></div>
    <span class="sb-price-val premium">500 000 ₽</span>
  </div>
</div>
<hr class="sb-divider">
<a class="sb-btn" href="https://t.me/psyteeth" target="_blank">Записаться → @psyteeth</a>
`;

const DAY_NAMES=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const COL_DOWS=[1,2,3,4,5,6,0];
const WEEKENDS=new Set([6,0]);
const WEEKDAYS=new Set([1,2,3,4,5]);

function moneyDays(y,m){
  const res=new Set();
  for(let i=0;i<8;i++){const d=new Date(y,m,21+i);if(d.getMonth()===m)res.add(d.getDate());}
  return res;
}
function maskDays(y,m){
  const res=new Set();
  const last=new Date(y,m+1,0).getDate();
  for(let d=1;d<=last;d+=3)res.add(d);
  return res;
}

function switchTab(t,el){
  mode=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('schoolName').textContent=t===0?'Исцеление отношений':'Зубное кунг-фу';
  render();
}

function render(){
  document.getElementById('mlbl').textContent=MR[cm]+' '+cy;
  document.getElementById('legend').innerHTML=(mode===0?IO_LEG:ZKF_LEG).map(x=>`<div class="li"><div class="ld" style="background:${x.c}"></div>${x.l}</div>`).join('');
  document.getElementById('sidebar').innerHTML=mode===0?SIDEBAR_IO:SIDEBAR_ZKF;
  renderCal();
}

function renderCal(){
  const cal=document.getElementById('cal');
  const last=new Date(cy,cm+1,0).getDate();
  const today=new Date();
  const todayD=(today.getFullYear()===cy&&today.getMonth()===cm)?today.getDate():-1;
  const money=moneyDays(cy,cm);
  const masks=maskDays(cy,cm);
  const firstDow=new Date(cy,cm,1).getDay();
  const startOffset=COL_DOWS.indexOf(firstDow);
  const totalCells=Math.ceil((startOffset+last)/7)*7;

  let html='';
  DAY_NAMES.forEach(n=>{html+=`<div class="ch">${n}</div>`;});

  for(let cell=0;cell<totalCells;cell++){
    const col=cell%7;
    const dow=COL_DOWS[col];
    const date=cell-startOffset+1;
    const isWeekend=WEEKENDS.has(dow);
    const isWeekday=WEEKDAYS.has(dow);

    if(date<1||date>last){html+=`<div class="c empty"></div>`;continue;}

    const isToday=date===todayD;
    const cls=['c',isToday?'tod':'',isWeekend&&!isToday?'weekend':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}"><div class="dn">${date}</div>`;

    if(mode===0){
      (IO_SCHED[dow]||[]).forEach(s=>{html+=`<div class="slot ${s.cls}">${s.lbl}</div>`;});
    } else {
      if(isWeekday)html+=`<div class="slot skf">Тренировки Зубного кунг-фу</div>`;
      if(money.has(date))html+=`<div class="slot sm">Денежный интенсив (бонус)</div>`;
      if(masks.has(date))html+=`<div class="slot sn">Работа с маской (бонус)</div>`;
    }
    html+=`</div>`;
  }
  cal.innerHTML=html;
}

function prevM(){cm--;if(cm<0){cm=11;cy--;}render();}
function nextM(){cm++;if(cm>11){cm=0;cy++;}render();}
render();
</script>
</body>
</html>
